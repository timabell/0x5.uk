{% extends "base.html" %}

{% block content %}
<div class="content">
	<h1>All Tags</h1>

	<div class="tags-list">
		{% for term in terms %}
		<div class="tag-item">
			<a href="{{ term.permalink }}">#{{ term.name }}</a>
			<span class="tag-count">({{ term.pages | length }} posts)</span>
		</div>
		{% endfor %}
	</div>
</div>
{% endblock content %}
